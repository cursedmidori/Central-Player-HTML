<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050202">
<title>Central do Player Mobile</title>
<style>
:root{
  --bg:#050202;--panel:#120706;--panel2:#090404;--line:#522629;--line2:#843940;
  --txt:#fff3ea;--mut:#bda69d;--red:#e43642;--blood:#690912;--gold:#d8a549;
  --green:#88d26d;--blue:#83baff;--purple:#c997ff;--r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);font-family:Georgia,"Times New Roman",serif;overscroll-behavior:none}
body{
  background:
    radial-gradient(circle at 10% 0,rgba(228,54,66,.24),transparent 34%),
    linear-gradient(145deg,#030101,#150707 55%,#050202);
  padding-bottom:84px;
}
body.morte{--red:#aaa;--blood:#111;--gold:#ddd;--line:#3a3a3a;--line2:#777}
body.conhecimento{--red:#d8a549;--blood:#4d3409;--gold:#ffe2a3;--line:#5b4520;--line2:#9b7838}
body.energia{--red:#b965ff;--blood:#1a0730;--gold:#e5c7ff;--line:#4d2868;--line2:#8b4cc0}
.app{width:min(760px,calc(100% - 14px));margin:8px auto 110px}
.card,.stat,.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(28,13,14,.96),rgba(8,4,4,.96));
  border-radius:var(--r);
  box-shadow:0 14px 38px rgba(0,0,0,.38);
}
.header{padding:12px;position:sticky;top:0;z-index:40;backdrop-filter:blur(10px)}
.hero{display:grid;grid-template-columns:58px 1fr;gap:10px;align-items:center}
.avatar{width:58px;height:58px;border:1px solid var(--line2);border-radius:14px;display:grid;place-items:center;background:radial-gradient(circle,rgba(228,54,66,.32),#050202 72%);font-size:24px;font-weight:900}
h1{margin:0;font-size:24px;line-height:1;text-transform:uppercase;text-shadow:2px 2px #000}
h2{margin:0 0 10px;font-size:17px;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
h2:before{content:"";width:24px;height:3px;background:var(--red);box-shadow:0 0 12px var(--red)}
h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--red)}
p,.muted,.meta{color:var(--mut);line-height:1.45}.meta{font-size:12px}.desc{white-space:pre-wrap;color:rgba(255,255,255,.86);line-height:1.35}
.badges,.actions,.mini{display:flex;flex-wrap:wrap;gap:7px}
.badge{display:inline-flex;align-items:center;min-height:25px;border:1px solid var(--line2);background:rgba(0,0,0,.25);border-radius:999px;color:var(--mut);font-size:10px;text-transform:uppercase;font-weight:900;padding:4px 8px}
.ok{color:#dfffd6;border-color:rgba(136,210,109,.7)}.warn{color:#ffe4a9;border-color:rgba(216,165,73,.8)}.bad{color:#ffd0d0;border-color:rgba(228,54,66,.85)}.info{color:#d8ebff;border-color:rgba(131,186,255,.75)}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.stat{padding:10px;background:rgba(0,0,0,.24);box-shadow:none}
.statTop{display:flex;justify-content:space-between;gap:8px}.statName{text-transform:uppercase;font-size:11px;font-weight:900}.statValue{font-size:21px;font-weight:900}
.bar{height:9px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.55);border-radius:99px;overflow:hidden;margin-top:7px}
.fill{height:100%;background:linear-gradient(90deg,#8b1018,var(--red))}.blueFill{background:linear-gradient(90deg,#1d4169,var(--blue))}.greenFill{background:linear-gradient(90deg,#2f652c,var(--green))}
.card{padding:12px;margin-top:10px}.item{border:1px solid var(--line);background:rgba(0,0,0,.25);border-radius:14px;padding:11px;margin-top:9px}
.title{font-weight:900;text-transform:uppercase;color:#fff}
button,.filebtn,input,select,textarea{font:inherit}
button,.filebtn{
  min-height:42px;border:1px solid var(--line);background:#130808;color:var(--txt);
  padding:9px 10px;border-radius:11px;text-transform:uppercase;font-weight:900;font-size:11px;letter-spacing:.05em;
}
button:active,.filebtn:active{transform:scale(.98)}
.danger{background:var(--blood);border-color:var(--red)}.green{border-color:rgba(136,210,109,.72);color:#dfffd6}.blue{border-color:rgba(131,186,255,.72);color:#d8ebff}.gold{border-color:rgba(216,165,73,.82);color:#ffe4a9}.purple{border-color:rgba(201,151,255,.82);color:#efd8ff}
label{display:block;margin:8px 0 5px;color:var(--mut);font-size:10px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}
input,select,textarea{width:100%;min-height:42px;border:1px solid #4b2c2c;background:#0d0606;color:var(--txt);padding:10px;outline:none;border-radius:11px}
textarea{min-height:96px;resize:vertical}
input[type=file]{display:none}
.grid{display:grid;gap:8px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:linear-gradient(180deg,rgba(5,2,2,.82),rgba(5,2,2,.98));
  border-top:1px solid var(--line);backdrop-filter:blur(12px);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
.navScroller{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}.navScroller::-webkit-scrollbar{display:none}
.nav button{white-space:nowrap;min-width:max-content}.nav .active{border-color:var(--red);background:rgba(105,9,18,.7)}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;z-index:80;background:#100707;border:1px solid var(--red);border-radius:14px;padding:11px 14px;box-shadow:0 12px 34px rgba(0,0,0,.5);transition:.18s;max-width:calc(100% - 24px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.rollPop{position:fixed;left:10px;right:10px;top:12px;z-index:90;opacity:0;transform:translateY(-16px);transition:.2s;border:1px solid var(--line2);background:linear-gradient(180deg,rgba(18,7,7,.99),rgba(6,2,2,.99));border-radius:16px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.65)}
.rollPop.show{opacity:1;transform:translateY(0)}.rpTitle{font-weight:900;text-transform:uppercase}.rpResult{font-size:36px;font-weight:900;color:var(--gold);line-height:1.1;margin-top:5px}.rpDetail{color:var(--mut);font-size:13px;margin-top:5px;word-break:break-word}
.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:flex-end}
.modal{width:100%;max-height:88vh;overflow:auto;background:#100707;border:1px solid var(--line2);border-radius:20px 20px 0 0;padding:14px;box-shadow:0 -18px 50px rgba(0,0,0,.5)}
.modalBg.show{display:flex}
.checkline{display:flex;gap:8px;align-items:center;color:var(--mut);font-size:13px}.checkline input{width:auto;min-height:auto}
pre{white-space:pre-wrap;color:var(--mut);font-family:inherit;font-size:12px}
@media(min-width:680px){.quick{grid-template-columns:repeat(4,1fr)}.grid.auto{grid-template-columns:1fr 1fr}.nav{left:50%;transform:translateX(-50%);width:min(760px,100%);border:1px solid var(--line);border-bottom:0;border-radius:18px 18px 0 0}}
</style>
</head>
<body class="sangue">
<main class="app">
  <section class="header card">
    <div class="hero">
      <div class="avatar" id="avatar">A</div>
      <div>
        <span class="badge bad">HTML Mobile</span>
        <h1 id="heroName">Agente</h1>
        <div class="badges">
          <span class="badge info" id="heroClass"></span>
          <span class="badge warn" id="heroNex"></span>
          <span class="badge ok" id="heroMode">Sessão</span>
        </div>
      </div>
    </div>
    <div class="quick" id="quick"></div>
  </section>

  <section id="view"></section>
</main>

<nav class="nav"><div class="navScroller" id="nav"></div></nav>
<div class="toast" id="toast"></div>
<div class="rollPop" id="rollPop"></div>
<div class="modalBg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
const KEY='central-player-mobile-v1';
const ATTRS=['Força','Agilidade','Intelecto','Presença','Vigor'];
const SKILLS=['Acrobacia','Adestramento','Artes','Atletismo','Atualidades','Ciências','Crime','Diplomacia','Enganação','Fortitude','Furtividade','Iniciativa','Intimidação','Intuição','Investigação','Luta','Medicina','Ocultismo','Percepção','Pilotagem','Pontaria','Profissão','Reflexos','Religião','Sobrevivência','Tática','Tecnologia','Vontade'];
const TYPES=['Balístico','Corte','Impacto','Perfuração','Fogo','Frio','Químico','Sangue','Morte','Conhecimento','Energia','Medo'];
const TABS=[
 ['sessao','Sessão'],['ficha','Ficha'],['perfil','Origem'],['pericias','Perícias'],['armas','Armas'],
 ['rituais','Rituais'],['poderes','Poderes'],['inventario','Inventário'],['defesa','Defesa'],
 ['condicoes','Condições'],['marcas','Marcas'],['investigacao','Investigação'],['preparar','Preparar'],
 ['evolucao','Evolução'],['validar','Validador'],['backup','Backups'],['json','JSON'],['config','Config']
];
const OPT={nexNivel:'NEX & Nível',semSanidade:'Jogando sem Sanidade',municao:'Contador de Munição',combateNarrativo:'Combate Narrativo',conjuracaoComplexa:'Conjuração Complexa',alteracoesNex:'Alterações de NEX'};
let tab='sessao';
let S=loadState();

function blank(){
 const attrs={},skills={}; ATTRS.forEach(a=>attrs[a]=1); SKILLS.forEach(s=>skills[s]={attr:skillAttr(s),train:0,bonus:0,temp:0,dice:0});
 return {
  p:{name:'Agente Sem Nome',class:'Sobrevivente',trail:'—',origin:'—',nex:5,level:1,affinity:'',theme:'sangue'},
  stats:{pv:20,pvMax:20,pe:4,peMax:4,pd:0,pdMax:0,san:20,sanMax:20,def:10,rd:0,dt:10,move:9,peTurn:1,load:0,loadMax:10},
  attrs,skills,optional:{nexNivel:false,semSanidade:false,municao:true,combateNarrativo:false,conjuracaoComplexa:false,alteracoesNex:false},
  profile:{concept:'',originPower:'',originSkills:'',classAbility:'',trailAbilities:'',appearance:'',personality:'',fear:'',objective:''},
  weapons:[{id:id('w'),name:'Ataque Improvisado',skill:'Luta',attr:'Força',test:'1d20+0',damage:'1d6',type:'Impacto',crit:'20/x2',range:'Corpo a corpo',category:'I',ammo:0,ammoMax:0,mods:'',curses:'',fav:true,equipped:true,notes:''}],
  rituals:[],powers:[],items:[],protections:[],buffs:[],conditions:[],injuries:[],marks:[],nexChanges:[],combos:[],evolution:[],backups:[],logs:[],
  prepare:{title:'',mainAction:'',moveAction:'',freeAction:'',reaction:'',use:'',target:'',pe:0,pd:0,pv:0,san:0,tests:'',damage:'',condition:'',failPlan:'',notes:''},
  mission:{name:'',objective:'',secondary:'',location:'',threat:'',npcs:'',clues:'',documents:'',symbols:'',suspects:'',questions:'',theories:'',timeline:'',relations:''},
  rest:{lastRest:'',interludeActions:'',treatment:'',crafting:'',study:'',training:''},
  turn:{scene:1,round:1,peSpent:0,pdSpent:0}
 };
}
function skillAttr(s){const m={Acrobacia:'Agilidade',Crime:'Agilidade',Furtividade:'Agilidade',Iniciativa:'Agilidade',Pilotagem:'Agilidade',Pontaria:'Agilidade',Reflexos:'Agilidade',Atletismo:'Força',Luta:'Força',Fortitude:'Vigor',Adestramento:'Presença',Artes:'Presença',Diplomacia:'Presença',Enganação:'Presença',Intimidação:'Presença',Intuição:'Presença',Percepção:'Presença',Vontade:'Presença'};return m[s]||'Intelecto'}
function id(p='id'){return p+Date.now()+Math.floor(Math.random()*99999)}
function n(v){return Number(v||0)}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function initials(s){return String(s||'A').trim().split(/\s+/).map(x=>x[0]).join('').slice(0,2).toUpperCase()||'A'}
function loadState(){try{return merge(blank(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return blank()}}
function merge(base,raw){
 const out={...base,...raw}; ['p','stats','attrs','skills','optional','profile','prepare','mission','rest','turn'].forEach(k=>out[k]={...base[k],...(raw[k]||{})});
 ['weapons','rituals','powers','items','protections','buffs','conditions','injuries','marks','nexChanges','combos','evolution','backups','logs'].forEach(k=>out[k]=Array.isArray(out[k])?out[k]:[]);
 SKILLS.forEach(s=>{out.skills[s]={...base.skills[s],...(out.skills[s]||{})}});
 return out;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function opt(k){return !!S.optional[k]}
function peLimit(){return Math.max(1,Math.ceil(n(S.p.nex)/5))}
function applyRules(){if(opt('nexNivel')){S.p.level=peLimit();S.stats.peTurn=peLimit()}}
function derived(){
 applyRules();
 const st={...S.stats};
 S.protections.filter(x=>x.equipped).forEach(x=>{st.def+=n(x.def);st.rd+=n(x.rd)});
 S.buffs.filter(x=>x.active).forEach(x=>{st.def+=n(x.def);st.rd+=n(x.rd);st.dt+=n(x.dt)});
 return st;
}
function render(){
 applyRules(); save();
 document.body.className=S.p.theme||'sangue';
 const st=derived();
 avatar.textContent=initials(S.p.name); heroName.textContent=S.p.name;
 heroClass.textContent=`${S.p.class} • ${S.p.trail}`; heroNex.textContent=`NEX ${S.p.nex}% • Nível ${S.p.level}`;
 quick.innerHTML=stat('PV',st.pv,st.pvMax,'')+(opt('semSanidade')?stat('PD',st.pd,st.pdMax,'blueFill'):stat('PE',st.pe,st.peMax,'blueFill')+stat('SAN',st.san,st.sanMax,'greenFill'))+`<div class="stat"><div class="statTop"><span class="statName">DEF/RD</span><span class="statValue">${st.def}/${st.rd}</span></div><p class="meta">DT ${st.dt} • Mov ${st.move}m</p></div>`;
 nav.innerHTML=TABS.map(t=>`<button class="${tab===t[0]?'active':''}" onclick="tab='${t[0]}';render()">${t[1]}</button>`).join('');
 view.innerHTML=(views[tab]||views.sessao)();
}
function stat(name,cur,max,cls){const key=name.toLowerCase(),pct=max?clamp(cur/max*100,0,100):0;return `<div class="stat"><div class="statTop"><span class="statName">${name}</span><span class="statValue">${cur}/${max}</span></div><div class="bar"><div class="fill ${cls}" style="width:${pct}%"></div></div><div class="mini"><button onclick="adj('${key}',-1)">-1</button><button class="green" onclick="adj('${key}',1)">+1</button></div></div>`}
function adj(k,v){S.stats[k]=clamp(n(S.stats[k])+v,0,n(S.stats[k+'Max']||9999));log('Status',`${k.toUpperCase()} ${v>0?'+':''}${v}`);render()}
function get(path){return path.split('.').reduce((o,k)=>o&&o[k],S)}
function set(path,val){const p=path.split('.');let o=S;for(let i=0;i<p.length-1;i++){o=o[p[i]]}o[p.at(-1)]=val;render()}
function field(label,path,lines=1){const v=esc(get(path));return `<label>${label}</label>${lines>1?`<textarea rows="${lines}" onchange="set('${path}',this.value)">${v}</textarea>`:`<input value="${v}" onchange="set('${path}',this.value)">`}`}
function numField(label,path){return `<label>${label}</label><input type="number" value="${n(get(path))}" onchange="set('${path}',Number(this.value))">`}
function badge(x,cls='info'){return `<span class="badge ${cls}">${esc(x)}</span>`}
function listCards(list,card){return list.length?list.map(card).join(''):'<p class="muted">Nada cadastrado.</p>'}

const views={
 sessao(){return `<section class="card"><h2>Sessão</h2><div class="actions"><button class="blue" onclick="roll('1d20','d20')">Rolar d20</button><button class="gold" onclick="tab='preparar';render()">Preparar</button><button class="purple" onclick="nextRound()">Nova rodada</button><button class="green" onclick="toast('Salvo')">Salvar</button></div></section><section class="card"><h2>Alertas</h2><div class="badges">${alerts().map(a=>badge(a,'warn')).join('')||badge('Tudo limpo','ok')}</div></section><section class="card"><h2>Favoritos</h2>${listCards([...S.weapons.filter(x=>x.fav||x.equipped),...S.rituals.filter(x=>x.fav),...S.powers.filter(x=>x.fav)],favCard)}</section><section class="card"><h2>Histórico</h2>${S.logs.slice().reverse().slice(0,8).map(logCard).join('')||'<p class="muted">Sem rolagens.</p>'}</section>`},
 ficha(){return `<section class="card"><h2>Ficha</h2>${field('Nome','p.name')}${field('Classe','p.class')}${field('Trilha','p.trail')}${field('Origem','p.origin')}<div class="grid two">${numField('NEX','p.nex')}${numField('Nível','p.level')}</div>${field('Afinidade','p.affinity')}<h3>Status</h3><div class="grid two">${['pv','pvMax','pe','peMax','pd','pdMax','san','sanMax','def','rd','dt','move','load','loadMax'].map(k=>numField(k.toUpperCase(),'stats.'+k)).join('')}</div><h3>Atributos</h3><div class="grid two">${ATTRS.map(a=>numField(a,'attrs.'+a)).join('')}</div></section>`},
 perfil(){return `<section class="card"><h2>Origem e Classe</h2>${field('Conceito','profile.concept',4)}${field('Poder da origem','profile.originPower',4)}${field('Perícias da origem','profile.originSkills',2)}${field('Habilidade de classe','profile.classAbility',4)}${field('Habilidades da trilha','profile.trailAbilities',5)}${field('Aparência','profile.appearance',4)}${field('Personalidade','profile.personality',4)}${field('Medo pessoal','profile.fear')}${field('Objetivo','profile.objective')}</section>`},
 pericias(){return `<section class="card"><h2>Perícias</h2>${SKILLS.map(skillCard).join('')}</section>`},
 armas(){return `<section class="card"><h2>Armas</h2><button class="green" onclick="addWeapon()">+ Arma</button>${listCards(S.weapons,weaponCard)}</section>`},
 rituais(){return `<section class="card"><h2>Rituais</h2><button class="green" onclick="addRitual()">+ Ritual</button>${listCards(S.rituals,ritualCard)}</section>`},
 poderes(){return `<section class="card"><h2>Poderes</h2><button class="green" onclick="addPower()">+ Poder</button>${listCards(S.powers,powerCard)}</section>`},
 inventario(){return `<section class="card"><h2>Inventário</h2><button class="green" onclick="addItem()">+ Item</button>${listCards(S.items,itemCard)}</section>`},
 defesa(){return `<section class="card"><h2>Proteções</h2><button class="green" onclick="addProtection()">+ Proteção</button>${listCards(S.protections,protectionCard)}</section><section class="card"><h2>Buffs</h2><button class="green" onclick="addBuff()">+ Buff</button>${listCards(S.buffs,buffCard)}</section>`},
 condicoes(){return `<section class="card"><h2>Condições</h2><div class="actions"><button class="green" onclick="addCondition()">+ Condição</button><button class="blue" onclick="presetCondition()">Biblioteca</button></div>${listCards(S.conditions,conditionCard)}</section>`},
 marcas(){return `<section class="card"><h2>Ferimentos</h2><button class="green" onclick="addRecord('injuries',{name:'Ferimento',type:'Físico',penalty:'',treatment:'',desc:''})">+ Ferimento</button>${listCards(S.injuries,x=>recordCard('injuries',x,['name','type','penalty','treatment','desc']))}</section><section class="card"><h2>Marcas</h2><button class="green" onclick="addRecord('marks',{name:'Marca',level:'',type:'',benefit:'',penalty:'',trigger:'',desc:''})">+ Marca</button>${listCards(S.marks,x=>recordCard('marks',x,['name','level','type','benefit','penalty','trigger','desc']))}</section><section class="card"><h2>Alterações de NEX</h2><button class="green" onclick="addRecord('nexChanges',{nex:'50',visual:'',mechanic:'',bonus:'',penalty:'',element:''})">+ Alteração</button>${listCards(S.nexChanges,x=>recordCard('nexChanges',x,['nex','visual','mechanic','bonus','penalty','element']))}</section>`},
 investigacao(){return `<section class="card"><h2>Investigação</h2>${field('Missão','mission.name')}${field('Objetivo','mission.objective',3)}${field('Local','mission.location')}${field('Ameaça','mission.threat')}${field('NPCs','mission.npcs',4)}${field('Pistas','mission.clues',5)}${field('Documentos','mission.documents',4)}${field('Símbolos','mission.symbols',3)}${field('Suspeitos','mission.suspects',3)}${field('Perguntas','mission.questions',4)}${field('Teorias','mission.theories',4)}${field('Linha do tempo','mission.timeline',5)}${field('Relações','mission.relations',4)}</section>`},
 preparar(){return `<section class="card"><h2>Preparar Ação</h2>${field('Título','prepare.title')}${field('Ação principal','prepare.mainAction')}${field('Movimento','prepare.moveAction')}${field('Livre','prepare.freeAction')}${field('Reação','prepare.reaction')}${field('Usar','prepare.use')}${field('Alvo','prepare.target')}<div class="grid two">${numField('PE','prepare.pe')}${numField('PD','prepare.pd')}${numField('PV','prepare.pv')}${numField('SAN','prepare.san')}</div>${field('Testes separados por ;','prepare.tests')}${field('Dano','prepare.damage')}${field('Condição aplicada','prepare.condition')}${field('Plano se falhar','prepare.failPlan',3)}${field('Notas','prepare.notes',4)}<div class="actions"><button class="green" onclick="executePrepared()">Executar tudo</button><button class="blue" onclick="copyPrepared()">Copiar</button></div></section><section class="card"><h2>Combos</h2><button class="green" onclick="addRecord('combos',{name:'Combo',requirements:'',buffs:'',actions:'',cost:'',tests:'',damage:'',risk:'',notes:''})">+ Combo</button>${listCards(S.combos,x=>recordCard('combos',x,['name','requirements','buffs','actions','cost','tests','damage','risk','notes']))}</section>`},

function roll(exp,title,damage=false){let r=rollExpr(exp,!damage);log(title,`${exp} = ${r.total} — ${r.detail}`);showRoll(title,exp,r);render()}
function rollExpr(exp,test=true){const parts=String(exp||'0').toLowerCase().replace(/\s/g,'').replace(/−/g,'-').match(/[+-]?[^+-]+/g)||['0'];let total=0,detail=[];for(let part of parts){let sign=1;if(part[0]==='+')part=part.slice(1);else if(part[0]==='-'){sign=-1;part=part.slice(1)}let m=part.match(/^(\d*)d(\d+)$/);if(m){let q=n(m[1]||1),f=n(m[2]),rolls=[];for(let i=0;i<q;i++)rolls.push(1+Math.floor(Math.random()*f));let used=(test&&f===20)?Math.max(...rolls):rolls.reduce((a,b)=>a+b,0);total+=sign*used;detail.push(`${sign<0?'-':''}${q}d${f}[${rolls.join(',')}]${test&&f===20?' maior '+used:''}`)}else{let v=n(part);total+=sign*v;detail.push(`${sign<0?'-':''}${v}`)}}return{total,detail:detail.join(' + ').replace(/\+ -/g,'- ')}}
function showRoll(title,exp,r){rollPop.className='rollPop show';rollPop.innerHTML=`<div class="rpTitle">${esc(title)}</div><div class="rpResult">${r.total}</div><div class="rpDetail">${esc(exp)} • ${esc(r.detail)}</div><div class="actions" style="margin-top:10px"><button onclick="rollPop.classList.remove('show')">Fechar</button></div>`;clearTimeout(window.rtimer);window.rtimer=setTimeout(()=>rollPop.classList.remove('show'),5200)}
function log(title,text){S.logs.push({title,text,time:new Date().toLocaleString('pt-BR')});if(S.logs.length>160)S.logs.shift()}
function alerts(full=false){let a=[];if(S.stats.pv<=0)a.push('PV zerado');else if(S.stats.pv<=S.stats.pvMax/2)a.push('PV baixo');if(!opt('semSanidade')&&S.stats.san<=S.stats.sanMax/3)a.push('SAN crítica');if(S.stats.load>S.stats.loadMax)a.push('Carga acima do limite');S.weapons.forEach(w=>{if(n(w.ammoMax)>0&&n(w.ammo)<=2)a.push('Munição baixa: '+w.name);if(full&&String(w.damage||'').trim()==='')a.push('Arma sem dano: '+w.name)});S.rituals.forEach(r=>{if(full&&String(r.cost||'').trim()==='')a.push('Ritual sem custo: '+r.name)});S.powers.forEach(p=>{if(full&&String(p.desc||'').trim()==='')a.push('Poder sem descrição: '+p.name)});return a}

function smartImport(j){
 if(j.p||j.stats||j.weapons||j.rituals||j.powers||j.items)return j;

 let b=blank();

 const pick=(obj,keys,fb='')=>{for(const k of keys){if(obj&&obj[k]!==undefined&&obj[k]!==null&&String(obj[k]).trim()!=='')return obj[k]}return fb};
 const toNum=v=>Number(v||0);
 const attrAlias={agi:'Agilidade',agilidade:'Agilidade',for:'Força','força':'Força',forca:'Força',int:'Intelecto',intelecto:'Intelecto',pre:'Presença','presença':'Presença',presenca:'Presença',vig:'Vigor',vigor:'Vigor'};
 const attrName=v=>attrAlias[String(v||'').toLowerCase()]||String(v||'Força');

 b.p.name=pick(j,['nome','name','personagem','character'],b.p.name);
 b.p.class=pick(j,['classe','class'],b.p.class);
 b.p.trail=pick(j,['trilha','trail'],b.p.trail);
 b.p.origin=pick(j,['origem','origin'],b.p.origin);
 b.p.nex=toNum(pick(j,['nex','NEX','_lastNex'],b.p.nex));
 b.p.level=toNum(pick(j,['nivel','nível','level','_lastNivel'],Math.max(1,Math.ceil(b.p.nex/5))));
 b.p.affinity=pick(j,['afinidade','affinity'],b.p.affinity);
 b.p.image=pick(j,['avt','avatar','image','imagem'],b.p.image);
 if(String(b.p.affinity).toLowerCase().includes('energia'))b.p.theme='energia';
 if(String(b.p.affinity).toLowerCase().includes('morte'))b.p.theme='morte';
 if(String(b.p.affinity).toLowerCase().includes('conhecimento'))b.p.theme='conhecimento';
 if(String(b.p.affinity).toLowerCase().includes('sangue'))b.p.theme='sangue';

 b.profile.appearance=pick(j,['aparencia','aparência','appearance'],'');
 b.profile.objective=pick(j,['objetivo','objective'],'');
 b.profile.concept=pick(j,['back','background','historia','história'],'');
 b.mission.clues=pick(j,['note','notas','notes'],'');

 b.optional.semSanidade=!!j._modoSemSanidade;
 b.optional.nexNivel=!!j._modoSobrevivendoAoHorror;
 b.optional.municao=true;

 const st=j.stats||j.status||{};
 b.stats.pv=toNum(pick(st,['pvA','pvAtual','pv','vida'],b.stats.pv));
 b.stats.pvMax=toNum(pick(st,['pvM','pvMax','vidaMax','_autoPvM'],b.stats.pvMax));
 b.stats.pe=toNum(pick(st,['peA','peAtual','pe'],b.stats.pe));
 b.stats.peMax=toNum(pick(st,['peM','peMax','_autoPeM'],b.stats.peMax));
 b.stats.pd=toNum(pick(st,['pdA','pdAtual','pd'],b.stats.pd));
 b.stats.pdMax=toNum(pick(st,['pdM','pdMax','_autoPdM'],b.stats.pdMax));
 b.stats.san=toNum(pick(st,['sanA','sanAtual','san','sanidade'],b.stats.san));
 b.stats.sanMax=toNum(pick(st,['sanM','sanMax','sanidadeMax','_autoSanM'],b.stats.sanMax));
 const agiFromArray=Array.isArray(j.attr)?toNum(j.attr[0]):0;
 b.stats.def=10+agiFromArray+toNum(pick(st,['defEq'],0))+toNum(pick(st,['defOu'],0));
 b.stats.rd=toNum(pick(st,['rd','resistencia'],0));
 b.stats.dt=toNum(pick(st,['dt','dtRitual'],10+Math.floor(b.p.nex/5)));

 if(Array.isArray(j.attr)){
   // Formato usado por estas fichas: [Agilidade, Força, Intelecto, Presença, Vigor]
   b.attrs.Agilidade=j.attr[0]??b.attrs.Agilidade;
   b.attrs.Força=j.attr[1]??b.attrs.Força;
   b.attrs.Intelecto=j.attr[2]??b.attrs.Intelecto;
   b.attrs.Presença=j.attr[3]??b.attrs.Presença;
   b.attrs.Vigor=j.attr[4]??b.attrs.Vigor;
 }else{
   const at=j.atributos||j.attrs||{};
   ATTRS.forEach(a=>{if(at[a]!=null)b.attrs[a]=toNum(at[a])});
 }

 const sk=j.skills||j.pericias||{};
 SKILLS.forEach(name=>{
   const val=sk[name];
   if(val&&typeof val==='object'){
     b.skills[name]={...b.skills[name],train:toNum(val.g??val.train??val.treino??0),bonus:toNum(val.b??val.bonus??0),temp:toNum(val.temp??0)};
   }else if(val!=null){
     b.skills[name]={...b.skills[name],train:toNum(val)};
   }
 });

 const skillTotal=name=>{
   const s=b.skills[name]||{train:0,bonus:0,temp:0};
   return toNum(s.train)+toNum(s.bonus)+toNum(s.temp);
 };
 const attrDice=a=>Math.max(1,toNum(b.attrs[attrName(a)]||1));

 const convertAttack=a=>{
   const skName=pick(a,['skill','pericia','perícia'],'Luta');
   const attr=attrName(pick(a,['atributo','attr'],'for'));
   const dice=attrDice(attr);
   const bonus=skillTotal(skName)+toNum(pick(a,['atkBonus','customAtkBonus'],0));
   let dmg=pick(a,['dano','damage','dmg'],'1d6');
   const dmgBonus=toNum(pick(a,['dmgBonus','customDmgBonus'],0));
   const extra=pick(a,['extraDamage','danoExtra'],'');
   if(dmgBonus)dmg+='+'+dmgBonus;
   if(extra)dmg+='+'+extra;
   const mods=[...(Array.isArray(a.mods)?a.mods:[]),...(Array.isArray(a.features)?a.features:[])].filter(Boolean).join(', ');
   const malds=(Array.isArray(a.maldicoes)?a.maldicoes:[]).map(m=>`${m.nome||''}${m.elemento?' ('+m.elemento+')':''}`).join(', ');
   return {
     id:id('w'),
     name:pick(a,['n','nome','name'],'Arma'),
     skill:skName,
     attr:attr,
     test:`${dice}d20+${bonus}`,
     damage:dmg,
     type:pick(a,['tipo','type'],'Impacto'),
     crit:`${pick(a,['margem','critThreat'],'20')}/${pick(a,['mult','critMult'],'x2')}`,
     range:pick(a,['alcance','range'],''),
     category:pick(a,['cat','category'],''),
     ammo:toNum(pick(a,['municao','munição','ammo'],0)),
     ammoMax:toNum(pick(a,['municaoMax','muniçãoMax','ammoMax'],0)),
     mods:mods,
     curses:malds,
     fav:true,
     equipped:a.emUso===true||a.equipped===true||a._fromInv!==undefined,
     notes:pick(a,['desc','d','notes'],'')
   };
 };

 b.weapons=(j.atk||j.ataques||j.attacks||[]).map(convertAttack);

 const inv=Array.isArray(j.inv)?j.inv:(j.inventario||j.itens||j.items||[]);
 inv.forEach(item=>{
   const cat=pick(item,['itemCategoria','cat','categoria','type'],'Item');
   const isWeapon=item.arma===true;
   const isProtection=String(cat).toLowerCase().includes('prote')||item.def!==undefined;
   const malds=(Array.isArray(item.maldicoes)?item.maldicoes:[]).map(m=>`${m.nome||''}${m.elemento?' ('+m.elemento+')':''}`).join(', ');
   const mods=(Array.isArray(item.mod)?item.mod:[]).join(', ');
   const desc=[pick(item,['d','desc','descricao','descrição'],''),mods?'Modificações: '+mods:'',malds?'Maldições: '+malds:''].filter(Boolean).join('\n');

   if(isWeapon){
     const exists=b.weapons.some(w=>w.name===pick(item,['n','nome','name'],'Arma'));
     if(!exists)b.weapons.push(convertAttack(item));
   }else if(isProtection){
     b.protections.push({
       id:id('pr'),
       name:pick(item,['n','nome','name'],'Proteção'),
       type:cat,
       def:toNum(pick(item,['def'],0)),
       rd:toNum(pick(item,['rd'],0)),
       penalty:pick(item,['penalty','penalidade'],''),
       equipped:item.emUso===true||item.equipado===true||true,
       desc
     });
   }else{
     b.items.push({
       id:id('i'),
       name:pick(item,['n','nome','name'],'Item'),
       type:cat,
       qty:'1',
       load:String(pick(item,['p','peso','carga'],0)),
       uses:String(pick(item,['usos','uses'],0)),
       patent:pick(item,['cat','patente'],''),
       desc,
       fav:false
     });
   }
 });

 b.rituals=(j.rit||j.rituais||j.rituals||[]).map(r=>{
   const desc=pick(r,['d','desc','descricao','descrição'],'');
   return {
     id:id('r'),
     name:pick(r,['n','nome','name'],'Ritual'),
     element:pick(r,['el','elemento','element'],''),
     circle:pick(r,['c','circulo','círculo','circle'],''),
     execution:pick(r,['execucao','execução','execution'],''),
     range:pick(r,['alcance','range'],''),
     target:pick(r,['alvo','target','area','área'],''),
     duration:pick(r,['duracao','duração','duration'],''),
     resistance:pick(r,['resistencia','resistência','resistance'],''),
     cost:String(pick(r,['pe','custo','cost'],'')),
     damage:detectDice(desc),
     desc,
     fav:false,
     sustain:false
   };
 });

 b.powers=(j.hab||j.poderes||j.habilidades||j.powers||[]).map(p=>({
   id:id('p'),
   name:pick(p,['n','nome','name'],'Poder'),
   type:pick(p,['_categoria','_src','tipo','type'],'Habilidade'),
   prereq:pick(p,['prereq','preRequisito','pré-requisito'],''),
   cost:pick(p,['custo','cost'],''),
   action:pick(p,['acao','ação','action'],''),
   uses:pick(p,['usos','uses'],''),
   desc:pick(p,['d','desc','descricao','descrição','effect','efeito'],''),
   fav:false
 }));

 if(b.protections.length){
   b.protections.forEach(p=>p.equipped=true);
 }
 if(!b.weapons.length)b.weapons=blank().weapons;

 return b;
}
function copy(txt){navigator.clipboard?.writeText(txt);toast('Copiado.')}
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1800)}
function resetAll(){if(confirm('Resetar ficha?')){localStorage.removeItem(KEY);S=blank();render()}}
window.onerror=(msg)=>{view.innerHTML=`<section class="card"><h2>Erro</h2><p class="bad">${esc(msg)}</p><button class="danger" onclick="localStorage.removeItem(KEY);location.reload()">Limpar save</button></section>`}
render();
</script>
</body>
</html>
